# config.yaml
paths:
  pdf_path: "data/Ambedkar_book.pdf"
  output_folder: "processed"

models:
  embedding_model: "all-MiniLM-L6-v2"
  llm_model: "groq/llama3-8b-8192"    # ← Replace Ollama with Groq (free tier available)
  spacy_model: "en_core_web_sm"

chunking:
  buffer_size: 1
  breakpoint_threshold: 0.5
  max_tokens: 1024
  overlap_tokens: 128

graph:
  community_algorithm: "louvain"       # ← Replace leiden (needs C++ build) with louvain

retrieval:
  top_k_local: 5
  top_k_global: 3
  local_threshold_e: 0.3
  local_threshold_d: 0.3